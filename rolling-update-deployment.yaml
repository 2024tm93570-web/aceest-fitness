apiVersion: apps/v1
kind: Deployment
metadata:
  name: acest-fitness-rolling
spec:
  replicas: 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: acest-fitness-rolling
  template:
    metadata:
      labels:
        app: acest-fitness-rolling
    spec:
      containers:
      - name: acest-fitness
        image: amruta111/acest-fitness:v2.0.0
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: acest-fitness-rolling-service
spec:
  selector:
    app: acest-fitness-rolling
  type: NodePort
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30004
