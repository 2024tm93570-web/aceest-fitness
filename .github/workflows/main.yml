name: ACEest Gym CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint Code
        run: |
          pip install flake8
          flake8 . || true

      - name: Run Tests using Pytest
        run: |
          pytest

      - name: Build Docker Image
        run: |
          docker build -t aceest-gym-app .

      - name: Verify Docker Image
        run: |
          docker images

      # ── NEW: Push to Docker Hub ──────────────────────────────
      - name: Log in to Docker Hub
        # Only runs on push to main, not on pull requests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # Get version from git tag if exists, otherwise use latest
          GIT_TAG=$(git tag --points-at HEAD | grep '^v' | head -n1)
          if [ -n "$GIT_TAG" ]; then
            VERSION="${GIT_TAG#v}"
          else
            VERSION="latest"
          fi

          # Tag image with version and latest
          docker tag aceest-gym-app ${{ secrets.DOCKERHUB_USERNAME }}/acest-fitness:$VERSION
          docker tag aceest-gym-app ${{ secrets.DOCKERHUB_USERNAME }}/acest-fitness:latest

          # Push both tags
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/acest-fitness:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/acest-fitness:latest

          echo "Pushed version: $VERSION"