name: ACEest Gym CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Lint Code
        run: |
          pip install flake8
          flake8 . || true

      - name: Run Tests using Pytest
        run: |
          pytest

      - name: Build Docker Image
        run: |
          docker build -t aceest-gym-app .

      - name: Verify Docker Image
        run: |
          docker images

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="latest"
          fi

          echo "Pushing version: $VERSION"

          docker tag aceest-gym-app ${{ secrets.DOCKERHUB_USERNAME }}/acest-fitness:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/acest-fitness:$VERSION

          docker tag aceest-gym-app ${{ secrets.DOCKERHUB_USERNAME }}/acest-fitness:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/acest-fitness:latest