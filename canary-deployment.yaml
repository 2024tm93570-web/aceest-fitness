apiVersion: apps/v1
kind: Deployment
metadata:
  name: acest-fitness-stable
spec:
  replicas: 9
  selector:
    matchLabels:
      app: acest-fitness-canary
      version: stable
  template:
    metadata:
      labels:
        app: acest-fitness-canary
        version: stable
    spec:
      containers:
      - name: acest-fitness
        image: amruta111/acest-fitness:v1.0.0
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acest-fitness-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acest-fitness-canary
      version: canary
  template:
    metadata:
      labels:
        app: acest-fitness-canary
        version: canary
    spec:
      containers:
      - name: acest-fitness
        image: amruta111/acest-fitness:v2.0.0
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: acest-fitness-canary-service
spec:
  selector:
    app: acest-fitness-canary
  type: NodePort
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30003
