apiVersion: apps/v1
kind: Deployment
metadata:
  name: acest-fitness-production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acest-fitness-shadow
      version: production
  template:
    metadata:
      labels:
        app: acest-fitness-shadow
        version: production
    spec:
      containers:
      - name: acest-fitness
        image: amruta111/acest-fitness:v1.0.0
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acest-fitness-shadow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acest-fitness-shadow
      version: shadow
  template:
    metadata:
      labels:
        app: acest-fitness-shadow
        version: shadow
    spec:
      containers:
      - name: acest-fitness
        image: amruta111/acest-fitness:v2.0.0
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: acest-fitness-production-service
spec:
  selector:
    app: acest-fitness-shadow
    version: production
  type: NodePort
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30006
