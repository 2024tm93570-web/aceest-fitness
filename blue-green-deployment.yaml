apiVersion: apps/v1
kind: Deployment
metadata:
  name: acest-fitness-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acest-fitness
      version: blue
  template:
    metadata:
      labels:
        app: acest-fitness
        version: blue
    spec:
      containers:
      - name: acest-fitness
        image: amruta111/acest-fitness:v1.0.0
        ports:
        - containerPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acest-fitness-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acest-fitness
      version: green
  template:
    metadata:
      labels:
        app: acest-fitness
        version: green
    spec:
      containers:
      - name: acest-fitness
        image: amruta111/acest-fitness:v2.0.0
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: acest-fitness-bg-service
spec:
  selector:
    app: acest-fitness
    version: blue
  type: NodePort
  ports:
  - port: 80
    targetPort: 5000
    nodePort: 30002
